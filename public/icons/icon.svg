<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0284c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0369a1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="umbrellaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0ea5e9" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#skyGradient)" filter="url(#shadow)"/>

  <!-- Cloud layers -->
  <g fill="url(#cloudGradient)">
    <!-- Back cloud -->
    <ellipse cx="180" cy="200" rx="60" ry="30" opacity="0.6"/>
    <ellipse cx="230" cy="185" rx="45" ry="25" opacity="0.6"/>
    <ellipse cx="140" cy="195" rx="35" ry="20" opacity="0.6"/>

    <!-- Front cloud -->
    <ellipse cx="340" cy="210" rx="65" ry="35"/>
    <ellipse cx="395" cy="195" rx="50" ry="30"/>
    <ellipse cx="300" cy="205" rx="40" ry="25"/>
  </g>

  <!-- Rain drops -->
  <g fill="#ffffff" opacity="0.9">
    <g transform="translate(180, 250)">
      <ellipse cx="0" cy="0" rx="3" ry="8"/>
      <ellipse cx="-15" cy="10" rx="2.5" ry="6"/>
      <ellipse cx="15" cy="15" rx="3" ry="7"/>
      <ellipse cx="-30" cy="5" rx="2" ry="5"/>
      <ellipse cx="30" cy="0" rx="2.5" ry="6"/>
    </g>
    <g transform="translate(340, 270)">
      <ellipse cx="0" cy="0" rx="3" ry="8"/>
      <ellipse cx="-18" cy="12" rx="2.5" ry="6"/>
      <ellipse cx="18" cy="10" rx="3" ry="7"/>
      <ellipse cx="-35" cy="8" rx="2" ry="5"/>
      <ellipse cx="35" cy="5" rx="2.5" ry="6"/>
    </g>
  </g>

  <!-- Protective umbrella/shield -->
  <g transform="translate(256, 340)">
    <!-- Umbrella canopy -->
    <path d="M-70,-20 Q0,-70 70,-20 Q50,-10 -50,-10 Z" fill="url(#umbrellaGradient)" filter="url(#shadow)"/>
    <path d="M-50,-10 Q0,-45 50,-10" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.3"/>

    <!-- Umbrella handle -->
    <path d="M0,-10 Q0,20 0,50" stroke="#ffffff" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M0,50 Q15,65 15,75" stroke="#ffffff" stroke-width="6" fill="none" stroke-linecap="round"/>

    <!-- Shield center -->
    <circle cx="0" cy="-15" r="18" fill="#ffffff" opacity="0.2"/>
    <text x="0" y="-10" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">⛑</text>
  </g>

  <!-- Location pin / family indicator -->
  <g transform="translate(420, 420)">
    <circle cx="0" cy="0" r="18" fill="#ef4444" opacity="0.9"/>
    <circle cx="0" cy="-3" r="8" fill="#ffffff"/>
    <circle cx="0" cy="-3" r="4" fill="#ef4444"/>
  </g>

  <!-- Decorative water droplets -->
  <g fill="#ffffff" opacity="0.4">
    <ellipse cx="80" cy="420" rx="8" ry="12" transform="rotate(-20 80 420)"/>
    <ellipse cx="430" cy="430" rx="6" ry="10" transform="rotate(15 430 430)"/>
    <ellipse cx="120" cy="100" rx="5" ry="8" transform="rotate(-30 120 100)"/>
    <ellipse cx="390" cy="90" rx="7" ry="11" transform="rotate(25 390 90)"/>
  </g>
</svg>